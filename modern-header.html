<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pill-Shaped Header</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #6c63ff;
            --glass-bg: rgba(15, 15, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 200vh; /* Simulate scrollable page */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(108, 99, 255, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 245, 212, 0.05), transparent 25%);
        }

        /* Header Container */
        .header-wrapper {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Scroll Shrink Effect */
        .header-wrapper.scrolled {
            top: 12px;
            width: 80%;
            max-width: 1000px;
        }

        /* Pill Shape & Glassmorphism */
        .pill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-radius: 100px; /* Stadium shape */
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.8), rgba(10, 10, 15, 0.9));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: padding 0.4s ease;
        }

        .header-wrapper.scrolled .pill-header {
            padding: 8px 20px;
            background: rgba(10, 10, 15, 0.95);
        }

        /* Logo */
        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }

        /* Desktop Navigation */
        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text-color);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* CTA Button */
        .cta-btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
            background-color: #5b54e5;
        }

        .header-wrapper.scrolled .cta-btn {
            padding: 8px 20px;
        }

        /* Hamburger Menu Icon */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            z-index: 1001;
        }

        .bar {
            width: 24px;
            height: 2px;
            background-color: var(--text-color);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 32px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 999;
        }

        .mobile-menu.active {
            opacity: 1;
            pointer-events: all;
        }

        .mobile-nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 2rem;
            font-weight: 700;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .mobile-menu.active .mobile-nav-link {
            transform: translateY(0);
            opacity: 1;
        }

        .mobile-menu.active .mobile-nav-link:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-nav-link:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-nav-link:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-nav-link:nth-child(4) { transition-delay: 0.4s; }

        /* Hamburger Animation */
        .menu-toggle.active .bar:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }
        .menu-toggle.active .bar:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active .bar:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .cta-btn.desktop {
                display: none;
            }
            .menu-toggle {
                display: flex;
            }
            .pill-header {
                padding: 12px 20px;
            }
        }

        /* Dummy content to allow scrolling */
        .content {
            padding-top: 150px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .placeholder-block {
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            margin: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <!-- Header Wrapper -->
    <header class="header-wrapper" id="headerWrapper">
        <div class="pill-header">
            <!-- Logo -->
            <a href="#" class="logo">
                <span class="logo-dot"></span>
                Nexus
            </a>

            <!-- Desktop Nav -->
            <nav class="nav-links">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Services</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>

            <!-- CTA Desktop -->
            <a href="#" class="cta-btn desktop">Get Started</a>

            <!-- Hamburger Button -->
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="#" class="mobile-nav-link">Home</a>
        <a href="#" class="mobile-nav-link">About</a>
        <a href="#" class="mobile-nav-link">Services</a>
        <a href="#" class="mobile-nav-link">Contact</a>
        <a href="#" class="cta-btn" style="margin-top: 24px;">Get Started</a>
    </div>

    <!-- Page Content (For scrolling demonstration) -->
    <main class="content">
        <h1>Scroll Down to See the Effect</h1>
        <p style="color: rgba(255,255,255,0.6); margin-top: 10px;">The pill header will subtly shrink and adjust its background.</p>
        
        <div class="placeholder-block">Section 1</div>
        <div class="placeholder-block">Section 2</div>
        <div class="placeholder-block">Section 3</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const headerWrapper = document.getElementById('headerWrapper');
            const menuToggle = document.getElementById('menuToggle');
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileLinks = document.querySelectorAll('.mobile-nav-link');

            // Scroll Shrink Effect
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    headerWrapper.classList.add('scrolled');
                } else {
                    headerWrapper.classList.remove('scrolled');
                }
            });

            // Hamburger Menu Toggle
            const toggleMenu = () => {
                menuToggle.classList.toggle('active');
                mobileMenu.classList.toggle('active');
                document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
            };

            menuToggle.addEventListener('click', toggleMenu);

            // Close mobile menu when a link is clicked
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (mobileMenu.classList.contains('active')) {
                        toggleMenu();
                    }
                });
            });
        });
    </script>
</body>
</html>
